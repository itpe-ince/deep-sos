<!doctype html>
<html lang="ko">
  <body style="margin:0;background:#f8fafc;font-family:-apple-system,sans-serif;color:#0f172a">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0">
      <tr>
        <td align="center">
          <table width="560" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08)">
            <tr>
              <td style="padding:32px 40px;background:linear-gradient(135deg,#2563eb 0%,#059669 100%);color:#ffffff">
                <div style="font-size:12px;letter-spacing:1px;opacity:.9">SOS랩 · USCP</div>
                <div style="font-size:22px;font-weight:700;margin-top:6px">비밀번호 재설정</div>
              </td>
            </tr>
            <tr>
              <td style="padding:32px 40px">
                <p style="margin:0 0 16px;font-size:15px;line-height:1.6">
                  안녕하세요. SOS랩 계정의 비밀번호 재설정을 요청하셨습니다.
                </p>
                <p style="margin:0 0 24px;font-size:15px;line-height:1.6">
                  아래 버튼을 클릭하면 새 비밀번호를 설정하실 수 있습니다. 링크는 <strong>{{ expires_minutes }}분간</strong> 유효합니다.
                </p>
                <p style="margin:0 0 24px;text-align:center">
                  <a href="{{ reset_url }}"
                     style="display:inline-block;padding:14px 32px;background:#2563eb;color:#ffffff;text-decoration:none;border-radius:8px;font-size:15px;font-weight:600">
                    비밀번호 재설정하기
                  </a>
                </p>
                <p style="margin:0 0 12px;font-size:13px;color:#64748b">
                  버튼이 동작하지 않는다면 아래 URL을 복사해 브라우저에 붙여넣어 주세요.
                </p>
                <p style="margin:0 0 24px;font-size:12px;color:#334155;word-break:break-all;background:#f1f5f9;padding:12px;border-radius:6px">
                  {{ reset_url }}
                </p>
                <hr style="border:none;border-top:1px solid #e2e8f0;margin:24px 0" />
                <p style="margin:0;font-size:12px;color:#94a3b8;line-height:1.6">
                  본인이 요청하지 않은 경우 이 이메일을 무시해주세요. 계정은 안전합니다.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:20px 40px;background:#f8fafc;font-size:11px;color:#94a3b8;text-align:center">
                © 2026 SOS랩 (USCP) · 지역사회특화센터 · ESG센터 · 국제협력센터
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
