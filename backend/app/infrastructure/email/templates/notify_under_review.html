<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>USCP 의제 검토 시작 안내</title>
</head>
<body style="font-family:Pretendard,sans-serif;color:#0F172A;background:#F8FAFC;margin:0;padding:24px 0">
  <div style="max-width:600px;margin:0 auto;background:#FFFFFF;border:1px solid #e5e7eb;border-radius:8px;overflow:hidden">
    <div style="padding:24px;background:#1E40AF;color:#FFFFFF">
      <div style="font-weight:800;font-size:20px">USCP</div>
      <div style="font-size:13px;opacity:.9">국립공주대학교 글로컬사업단 지역사회특화센터</div>
    </div>
    <div style="padding:24px">
      <h1 style="margin:0 0 12px;font-size:18px;color:#0F172A">의제 검토가 시작되었습니다</h1>
      <p style="margin:0 0 16px;line-height:1.7;color:#475569">
        안녕하세요 <strong>{{ user_name }}</strong>님,<br>
        제보해 주신 의제 「<strong>{{ issue_title }}</strong>」 가 운영자 검토 단계로 진입했습니다.
      </p>
      <p style="margin:0 0 16px;line-height:1.7;color:#475569">
        검토중 단계에서는 운영자가 의제의 성격을 확인하고 트랙 라벨(정책반영·정책참고·시민자율)을 부여합니다.
        검토 결과는 곧 추가 안내드리겠습니다.
      </p>
      <div style="margin:24px 0;text-align:center">
        <a href="{{ base_url }}/issues/{{ issue_id }}"
           style="display:inline-block;padding:12px 24px;border-radius:6px;background:#1E40AF;color:#FFFFFF;text-decoration:none;font-weight:600">
          의제 상세 보기
        </a>
      </div>
      <hr style="border:0;border-top:1px solid #e5e7eb;margin:24px 0">
      <p style="font-size:12px;color:#64748B;line-height:1.6">
        본 메일은 의제 단계 변경 시 자동 발송됩니다.
        알림 수신을 끄려면 <a href="{{ base_url }}/user/profile" style="color:#1E40AF">프로필 설정</a> 에서 변경하세요.
      </p>
    </div>
  </div>
</body>
</html>
