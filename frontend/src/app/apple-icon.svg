<svg width="44" height="44" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="국립공주대학교 지역사회특화센터 — 지역사회연구 거점캠퍼스">
  <title>국립공주대학교 지역사회특화센터</title>
  <desc>5개 지역(대전·공주·예산·천안·세종) 협력과 거점캠퍼스를 상징하는 나무 형태 로고. 9개 잎은 협력 주체의 다양성, 중앙 녹색 잎은 공주(주관) 거점, 회색 줄기는 본교·협력 캠퍼스의 기반을 표현.</desc>

  <!-- 거점캠퍼스 줄기 (본교 + 협력 캠퍼스 기반) -->
  <rect x="46" y="62" width="8" height="26" rx="3" fill="#94a3b8"/>

  <!-- 잎 9개 — 5개 지역 컬러 + 4개 보조 컬러 (협력 주체의 다양성) -->
  <!-- 잎 path: 위로 뾰족한 물방울, 회전 중심 (50, 62) -->

  <!-- 좌측 4잎 -->
  <g transform="rotate(-75, 50, 62)">
    <path d="M 50,62 C 57,55 58,28 50,15 C 42,28 43,55 50,62 Z" fill="#7c3aed"/>
  </g>
  <g transform="rotate(-55, 50, 62)">
    <path d="M 50,62 C 57,55 58,28 50,15 C 42,28 43,55 50,62 Z" fill="#ec4899"/>
  </g>
  <g transform="rotate(-35, 50, 62)">
    <path d="M 50,62 C 57,55 58,28 50,15 C 42,28 43,55 50,62 Z" fill="#2563eb"/>
  </g>
  <g transform="rotate(-17, 50, 62)">
    <path d="M 50,62 C 57,55 58,28 50,15 C 42,28 43,55 50,62 Z" fill="#06b6d4"/>
  </g>

  <!-- 중앙 잎 (공주, 주관 지역) — 약간 더 크게 강조 -->
  <path d="M 50,62 C 59,54 60,25 50,10 C 40,25 41,54 50,62 Z" fill="#059669"/>

  <!-- 우측 4잎 -->
  <g transform="rotate(17, 50, 62)">
    <path d="M 50,62 C 57,55 58,28 50,15 C 42,28 43,55 50,62 Z" fill="#db2777"/>
  </g>
  <g transform="rotate(35, 50, 62)">
    <path d="M 50,62 C 57,55 58,28 50,15 C 42,28 43,55 50,62 Z" fill="#f59e0b"/>
  </g>
  <g transform="rotate(55, 50, 62)">
    <path d="M 50,62 C 57,55 58,28 50,15 C 42,28 43,55 50,62 Z" fill="#ef4444"/>
  </g>
  <g transform="rotate(75, 50, 62)">
    <path d="M 50,62 C 57,55 58,28 50,15 C 42,28 43,55 50,62 Z" fill="#ea580c"/>
  </g>
</svg>
