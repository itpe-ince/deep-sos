# USCP v1 — 운영 nginx 설정 (Sprint 5 Day 1)
# HTTP → HTTPS 리디렉션 + HTTPS reverse proxy + Let's Encrypt webroot
#
# 이 파일은 docker-compose.prod.yml에서 /etc/nginx/conf.d/default.conf 대신
# 마운트되어 사용된다.

upstream uscp_backend {
    server api:8000;
    keepalive 32;
}

upstream uscp_frontend {
    server web:3000;
    keepalive 32;
}

# ─────────────────────────────────────────────
# HTTP (80) — ACME challenge + HTTPS redirect
# ─────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name ${SERVER_NAME};

    # Let's Encrypt 웹루트 챌린지
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 그 외 전부 HTTPS로
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────
# HTTPS (443) — 메인 서빙
# ─────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${SERVER_NAME};

    ssl_certificate /etc/letsencrypt/live/${SERVER_NAME}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${SERVER_NAME}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS (운영 전환 후 점진 적용)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ── Backend API ──
    location /api/v1/ {
        proxy_pass http://uscp_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # SSE / WebSocket upgrade (Sprint 5 P2 — SSE 알림 스트림)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── MinIO presigned URL 프록시 (선택적) ──
    # 이미지 직접 노출 대신 nginx를 통해 서빙하고 싶을 때 사용
    # location /cdn/ {
    #     proxy_pass http://minio:9000/uscp-uploads/;
    #     proxy_set_header Host $host;
    # }

    # ── Frontend (Next.js SSR) ──
    location / {
        proxy_pass http://uscp_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # HMR/웹소켓 (Next dev만 사용, prod 빌드에선 사실상 불필요)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
    }
}
