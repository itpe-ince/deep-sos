# USCP 개발환경 — 외부 tuzi 인프라(postgres, redis) 활용
# tuzi-postgres (:5432), tuzi-redis (:6379)는 이미 실행 중이어야 합니다.
#
# 사용법:
#   docker compose -f docker-compose.dev.yml up -d

services:
  minio:
    image: minio/minio:latest
    container_name: uscp-dev-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - miniodata-dev:/data

volumes:
  miniodata-dev:
