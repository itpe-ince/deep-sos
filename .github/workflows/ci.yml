name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: uscp
          POSTGRES_PASSWORD: test-password
          POSTGRES_DB: uscp_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U uscp -d uscp_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://uscp:test-password@localhost:5432/uscp_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: test-secret
          JWT_REFRESH_SECRET_KEY: test-refresh-secret
        run: pytest -v --cov=app --cov-report=term-missing

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type check
        run: npm run type-check
      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost/api
        run: npm run build

  e2e-test:
    name: E2E Tests (Playwright)
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: uscp
          POSTGRES_PASSWORD: test-password
          POSTGRES_DB: uscp_e2e
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U uscp -d uscp_e2e"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
    env:
      DATABASE_URL: postgresql+asyncpg://uscp:test-password@localhost:5432/uscp_e2e
      REDIS_URL: redis://localhost:6379/1
      JWT_SECRET_KEY: e2e-test-secret
      JWT_REFRESH_SECRET_KEY: e2e-test-refresh-secret
    steps:
      - uses: actions/checkout@v4

      # ── Backend setup ──────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install backend deps
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run migrations
        working-directory: ./backend
        run: alembic upgrade head
      - name: Seed E2E test user
        working-directory: ./backend
        run: python -m scripts.seed_e2e

      # ── Frontend setup ─────────────────────
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: ./frontend
        run: npm ci
      - name: Build frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3810/api
        run: npm run build

      # ── Start services ─────────────────────
      - name: Start backend
        working-directory: ./backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 3810 &
          sleep 3
          curl -sf http://localhost:3810/health || (echo "Backend failed to start" && exit 1)
      - name: Start frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3810/api
        run: |
          npx next start -p 3800 &
          sleep 3
          curl -sf http://localhost:3800 || (echo "Frontend failed to start" && exit 1)

      # ── Playwright ─────────────────────────
      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: ./frontend
        env:
          CI: 'true'
          E2E_BASE_URL: http://localhost:3800
          E2E_API_URL: http://localhost:3810/api/v1
        run: npx playwright test --project=chromium
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

  docker-build:
    name: Docker Images (Backend + Frontend)
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract short SHA
        id: meta
        run: echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/uscp-backend:latest
            ghcr.io/${{ github.repository_owner }}/uscp-backend:${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://${{ vars.SERVER_NAME || 'staging.uscp.local' }}/api
          tags: |
            ghcr.io/${{ github.repository_owner }}/uscp-frontend:latest
            ghcr.io/${{ github.repository_owner }}/uscp-frontend:${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
