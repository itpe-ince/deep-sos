services:
  nginx:
    image: nginx:1.27-alpine
    container_name: uscp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    depends_on:
      - web
      - api
    networks:
      - uscp

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: uscp-web
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://nginx/api
      - NEXT_PUBLIC_KAKAO_MAP_API_KEY=${KAKAO_MAP_API_KEY}
    depends_on:
      - api
    networks:
      - uscp

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: uscp-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://uscp:${POSTGRES_PASSWORD}@db:5432/uscp
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_REFRESH_SECRET_KEY=${JWT_REFRESH_SECRET_KEY}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=uscp-uploads
      - MINIO_SECURE=false
      - ENVIRONMENT=production
      - CORS_ORIGINS=http://localhost,http://nginx
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - uscp

  db:
    image: postgis/postgis:16-3.4
    container_name: uscp-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=uscp
      - POSTGRES_USER=uscp
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uscp -d uscp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uscp

  redis:
    image: redis:7-alpine
    container_name: uscp-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - uscp

  minio:
    image: minio/minio:latest
    container_name: uscp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    volumes:
      - miniodata:/data
    ports:
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - uscp

volumes:
  pgdata:
  redisdata:
  miniodata:

networks:
  uscp:
    driver: bridge
